name: Training
options:
  bundleIdPrefix: com.training
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"

targets:
  Training:
    type: application
    platform: iOS
    sources:
      - path: Training
        excludes:
          - "Secrets.swift.example"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.training.app
        PRODUCT_NAME: Training
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Training/Training.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Training reads your Health data (steps, heart rate, workouts, sleep, etc.) to generate personalized training insights and recovery advice."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Training may log workouts and activity to Health."
